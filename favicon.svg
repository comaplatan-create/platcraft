<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Pixel-art soil block with PS letters -->
  <rect width="64" height="64" fill="#0b1220"/>
  <!-- top grass layer -->
  <rect x="8" y="8" width="48" height="12" fill="#6aa84f"/>
  <rect x="8" y="20" width="48" height="6" fill="#4a7a2f"/>
  <!-- soil pixels -->
  <rect x="8" y="26" width="10" height="10" fill="#8b5a2b"/>
  <rect x="18" y="26" width="10" height="10" fill="#6e3f24"/>
  <rect x="28" y="26" width="10" height="10" fill="#7a4a2a"/>
  <rect x="38" y="26" width="10" height="10" fill="#5b351e"/>
  <rect x="8" y="36" width="10" height="10" fill="#5b351e"/>
  <rect x="18" y="36" width="10" height="10" fill="#7a4a2a"/>
  <rect x="28" y="36" width="10" height="10" fill="#6e3f24"/>
  <rect x="38" y="36" width="10" height="10" fill="#8b5a2b"/>
  <!-- PS letters (pixel font) -->
  <g fill="#fde047">
    <!-- P -->
    <rect x="18" y="18" width="4" height="12"/>
    <rect x="22" y="18" width="6" height="4"/>
    <rect x="22" y="22" width="6" height="4"/>
    <!-- S -->
    <rect x="34" y="18" width="6" height="4"/>
    <rect x="34" y="22" width="6" height="4"/>
    <rect x="34" y="26" width="6" height="4"/>
  </g>
</svg>
